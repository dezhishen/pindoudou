terms.s1Title:
  zh-CN: 服务说明
  en: Service Description
  zh-TW: 服務說明

terms.s1Text:
  zh-CN: 拼豆图案生成器是一个纯前端的图片处理工具，用于将上传的图片转换为拼豆图案。所有图片处理均在用户浏览器中完成，不会上传到任何服务器。
  en: Bead Pattern Generator is a client-side image processing tool that converts uploaded images into bead patterns. All image processing is done locally in your browser and no data is uploaded to any server.
  zh-TW: 拼豆圖案生成器是一個純前端的圖片處理工具，用於將上傳的圖片轉換為拼豆圖案。所有圖片處理均在用戶瀏覽器中完成，不會上傳到任何伺服器。

terms.s2Title:
  zh-CN: 隐私保护
  en: Privacy Protection
  zh-TW: 隱私保護

terms.s2Text:
  zh-CN: 我们高度重视用户隐私。本应用不会收集、存储或传输您的任何个人数据或上传的图片。历史记录功能将数据存储在浏览器的本地存储中，您可以随时清除。
  en: We highly value user privacy. This application does not collect, store, or transmit any personal data or uploaded images. The history feature stores data in your browser's local storage, which you can clear at any time.
  zh-TW: 我們高度重視用戶隱私。本應用不會收集、儲存或傳輸您的任何個人資料或上傳的圖片。歷史記錄功能將資料儲存在瀏覽器的本機儲存中，您可以隨時清除。

terms.s3Title:
  zh-CN: 知识产权
  en: Intellectual Property
  zh-TW: 知識產權

terms.s3Text:
  zh-CN: 用户上传的图片及其生成的拼豆图案，其知识产权归用户所有。本应用的代码和设计归开发者所有。
  en: The intellectual property rights of uploaded images and generated bead patterns belong to the user. The application code and design belong to the developer.
  zh-TW: 用戶上傳的圖片及其生成的拼豆圖案，其知識產權歸用戶所有。本應用的程式碼和設計歸開發者所有。

terms.s4Title:
  zh-CN: 免责声明
