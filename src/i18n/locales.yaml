strategy.euclidean-rgb:
  zh-CN: RGB 欧几里得
  en: RGB Euclidean
  zh-TW: RGB 歐幾里得

strategy.euclidean-rgbDesc:
  zh-CN: RGB空间直接距离，速度快但对暗色区域偏差较大
  en: Direct RGB distance, fast but less accurate in dark areas
  zh-TW: RGB空間直接距離，速度快但對暗色區域偏差較大

strategy.weighted-rgb:
  zh-CN: 加权 RGB
  en: Weighted RGB
  zh-TW: 加權 RGB

strategy.weighted-rgbDesc:
  zh-CN: 提高绿色权重，模拟人眼敏感度，比纯RGB略好
  en: Higher green weight, simulates human eye sensitivity
  zh-TW: 提高綠色權重，模擬人眼敏感度，比純RGB略好

strategy.lab-euclidean:
  zh-CN: Lab 欧几里得
  en: Lab Euclidean
  zh-TW: Lab 歐幾里得

strategy.lab-euclideanDesc:
  zh-CN: 转换到CIELAB感知均匀空间后计算距离，还原度大幅提升
  en: CIELAB perceptually uniform space, much better accuracy
  zh-TW: 轉換到CIELAB感知均勻空間後計算距離，還原度大幅提升

strategy.cie76:
  zh-CN: CIE76 ΔE
  en: CIE76 ΔE
  zh-TW: CIE76 ΔE

strategy.cie76Desc:
  zh-CN: 经典ΔE76色差公式，Lab空间加权距离
  en: Classic ΔE76 formula, weighted distance in Lab space
  zh-TW: 經典ΔE76色差公式，Lab空間加權距離

strategy.cie2000:
  zh-CN: CIEDE2000
  en: CIEDE2000
  zh-TW: CIEDE2000

strategy.cie2000Desc:
  zh-CN: 业界金标准，最接近人眼感知，精度最高但计算量较大
  en: Industry gold standard, closest to human perception
  zh-TW: 業界金標準，最接近人眼感知，精度最高但計算量較大

strategy.bfs-merge:
  zh-CN: BFS 区域合并
  en: BFS Region Merge
  zh-TW: BFS 區域合併

strategy.bfs-mergeDesc:
  zh-CN: Lab匹配后BFS自动识别相邻相似区域并合并，阈值自适应
  en: Lab match then BFS auto-merges adjacent similar regions, adaptive threshold
  zh-TW: Lab匹配後BFS自動識別相鄰相似區域並合併，閾值自適應

strategy.bfsThreshold:
  zh-CN: 合并阈值
  en: Merge Threshold
  zh-TW: 合併閾值

strategy.bfsAuto:
  zh-CN: 自动
  en: Auto
  zh-TW: 自動

